<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --neon-gray: #e0e0e0;
            --neon-glow: rgba(255, 255, 255, 0.4);
            --bg: #000000;
            --card-bg: #0a0a0a;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #1a1a1a;
            --error: #ff4444;
            --success: #44ff44;
        }

        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        @keyframes drift { 0% { background-position: 0 0; } 100% { background-position: 1000px 1000px; } }
        @keyframes fade-out { from { opacity: 0.8; transform: scale(1); } to { opacity: 0; transform: scale(0.2); } }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.05) 50%, transparent); pointer-events: none; z-index: 1000; animation: scanline 10s linear infinite; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; color: var(--neon-gray); text-shadow: 0 0 10px var(--neon-glow); }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.6rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; padding: 5px 0; letter-spacing: 2px; }
        .nav-links a.active { color: var(--primary); border-bottom: 2px solid var(--primary); text-shadow: 0 0 10px var(--neon-glow); }

        .tab-content { display: none; min-height: calc(100vh - 100px); }
        .tab-content.active { display: block; }

        /* CHANGE LOG */
        .changelog-item { border-left: 1px solid #222; padding-left: 2rem; margin-bottom: 4rem; position: relative; }
        .changelog-item::before { content: ''; position: absolute; left: -3px; top: 0; width: 5px; height: 5px; background: #fff; box-shadow: 0 0 10px #fff; }
        .changelog-version { font-family: 'Inter'; font-weight: 900; letter-spacing: 4px; color: #fff; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .changelog-date { color: #555; font-size: 0.6rem; font-family: 'JetBrains Mono'; margin-bottom: 1rem; }
        .changelog-desc { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: #888; border-top: 1px solid #111; padding-top: 1rem; margin-top: 0.5rem; line-height: 1.8; }

        /* OPS MAP - v6.1 OMEGA SYNC */
        .map-wrapper { position: fixed; top: 75px; left: 0; width: 100%; height: calc(100vh - 75px); background: #000; overflow: hidden; display: none; }
        .map-wrapper.active { display: block; }
        .map-bg { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background-image: url('https://www.transparenttextures.com/patterns/topographic.png'); background-size: 800px 800px; opacity: 0.2; filter: invert(1) brightness(2); animation: drift 180s linear infinite; }
        .map-container { position: relative; width: 100%; height: 100%; background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_Map_Blank.svg') center/90% no-repeat; filter: invert(1) brightness(0.4) contrast(2) drop-shadow(0 0 5px var(--neon-glow)); opacity: 0.3; }
        .node-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .packet-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .node { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; transform: translate(-50%, -50%); }
        .node-info { position: absolute; top: 12px; left: 12px; font-family: 'JetBrains Mono'; font-size: 0.5rem; color: #fff; text-transform: uppercase; background: rgba(10,10,10,0.9); padding: 4px 6px; border: 1px solid #333; border-radius: 1px; }
        .packet { position: absolute; width: 3px; height: 3px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; z-index: 5; }
        .particle { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; animation: fade-out 0.8s forwards; pointer-events: none; }

        /* PORTAL RECON */
        .recon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .portal-card { background: #050505; border: 1px solid var(--border); padding: 1.5rem; border-left: 3px solid #fff; transition: 0.3s; }
        .portal-name { font-size: 0.8rem; font-weight: 900; color: #fff; margin-bottom: 0.5rem; }
        .portal-meta { font-size: 0.55rem; color: #555; margin-bottom: 1rem; }
        .portal-meta span { color: var(--success); font-family: 'JetBrains Mono'; }
        .portal-btn { background: #fff; color: #000; padding: 0.6rem 1rem; font-size: 0.6rem; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; }

        /* STORM MATRIX */
        .matrix-container { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-top: 2rem; }
        .matrix-card { background: var(--card-bg); border: 1px solid var(--border); border-left: 3px solid #fff; padding: 2rem; }
        textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 1rem; width: 100%; height: 400px; font-family: 'JetBrains Mono'; font-size: 0.75rem; }

        /* DASHBOARD */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; margin-top: 5rem; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 2rem; border-radius: 2px; }
        .card h3 { font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 1.5rem; color: var(--neon-gray); }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 0.8rem; border-radius: 2px; width: 100%; margin-bottom: 1rem; font-size: 0.8rem; font-family: 'JetBrains Mono'; }
        .btn { background: #fff; color: #000; border: none; padding: 0.9rem; border-radius: 2px; font-weight: 900; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 2px; }
        .results { margin-top: 1.5rem; background: #050505; border: 1px solid var(--border); padding: 1.2rem; font-family: 'JetBrains Mono'; font-size: 0.7rem; color: #aaa; white-space: pre-wrap; min-height: 80px; }

        #auth-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #050505; border: 1px solid var(--border); padding: 0; width: 450px; text-align: center; border-radius: 4px; overflow: hidden; }
        .auth-tabs { display: flex; border-bottom: 1px solid var(--border); }

        .auth-tab.active { color: #fff; background: var(--card-bg); border-bottom: 2px solid #fff; }
        .auth-body { padding: 3rem; }
        .hidden { display: none !important; }
    </style>

        let activeNodes = [];
        function handleLogin() {
            const user = document.getElementById('login-user').value;
            if(user.length > 0) { sessionStorage.setItem('logged', user); document.getElementById('auth-gate').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden'); initFullMap(); setInterval(spawnPacket, 2000); renderPortals(); renderChangeLog(); }
        }
        function logout() { sessionStorage.clear(); location.reload(); }
        window.onload = () => { if(sessionStorage.getItem('logged')) { document.getElementById('auth-gate').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden'); initFullMap(); setInterval(spawnPacket, 2000); renderPortals(); renderChangeLog(); } };

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.add('active');
            const mapWrapper = document.getElementById('full-map-wrapper');
            if(tab === 'opsmap') mapWrapper.classList.add('active'); else mapWrapper.classList.remove('active');
        }

        function switchAuth(mode) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('auth-login').classList.add('hidden');
            document.getElementById('auth-register').classList.add('hidden');
            if(mode === 'login') { document.querySelector('.auth-tab:nth-child(1)').classList.add('active'); document.getElementById('auth-login').classList.remove('hidden'); }
            else { document.querySelector('.auth-tab:nth-child(2)').classList.add('active'); document.getElementById('auth-register').classList.remove('hidden'); }
        }

        function renderPortals(filter = '') {
            const list = document.getElementById('portal-list');
            list.innerHTML = '';
            portals.filter(p => p.n.toLowerCase().includes(filter.toLowerCase()) || p.b.some(bin => bin.includes(filter))).forEach(p => {
                const url = `https://dxonline-apps-${p.u}-cloud.pscu.com/wps/portal/accesspoint/login?req=${p.r}`;
                const card = document.createElement('div');
                card.className = 'portal-card';
                card.innerHTML = `<div class="portal-name">${p.n}</div><div class="portal-meta">INFRA: <span>${p.u.toUpperCase()}</span> | BINS: <span>${p.b.join(', ') || 'N/A'}</span></div><button class="portal-btn" onclick="window.open('${url}')">INITIALIZE ACCESS</button>`;
                list.appendChild(card);
            });
        }
        function filterPortals() { renderPortals(document.getElementById('portal-search').value); }

        function renderChangeLog() {
            const container = document.getElementById('changelog-stream');
            const logs = [
                {v: 'v6.1 OMEGA SYNC', d: 'APRIL 30, 2026', c: '- Triangulated ground coordinates between v5.9 and v6.0.<br>- Pulled entire grid 90px left to land centers on named regions (NA WEST -> CA).'},
                {v: 'v6.0 FINAL LANDING', d: 'APRIL 30, 2026', c: '- Absolute region lock phase 1.'},
                {v: 'v5.0 CONSTELLATION', d: 'APRIL 30, 2026', c: '- Global Node Expansion & Sparkling Shooting Star trails.'}
            ];
            container.innerHTML = logs.map(l => `<div class="changelog-item"><div class="changelog-version">${l.v}</div><div class="changelog-date">${l.d}</div><div class="changelog-desc">${l.c}</div></div>`).join('');
        }

        function initFullMap() {
            const layer = document.getElementById('node-layer');
            layer.innerHTML = '';
            activeNodes = [
                {x: 560, y: 310, l: 'NA EAST'}, {x: 430, y: 330, l: 'NA WEST'}, {x: 960, y: 220, l: 'EU WEST'},
                {x: 1020, y: 250, l: 'EU CENTRAL'}, {x: 1600, y: 300, l: 'AS PAC'}, {x: 1500, y: 440, l: 'AS EAST'},
                {x: 730, y: 680, l: 'SA EAST'}, {x: 1030, y: 580, l: 'AF MID'}, {x: 1260, y: 240, l: 'RU REAPER'},
                {x: 1750, y: 760, l: 'AU SOUTH'}, {x: 1790, y: 720, l: 'AU EAST'}, {x: 1190, y: 380, l: 'ME CENTRAL'}
            ];
            activeNodes.forEach(n => {
                const node = document.createElement('div'); node.className = 'node'; node.style.left = `${n.x}px`; node.style.top = `${n.y}px`;
                node.innerHTML = `<div class="node-info">${n.l}</div>`; layer.appendChild(node);
            });
        }

        function spawnPacket() {
            const start = activeNodes[Math.floor(Math.random() * activeNodes.length)];
            const end = activeNodes[Math.floor(Math.random() * activeNodes.length)];
            if(!start || !end || start === end) return;
            const layer = document.getElementById('packet-layer');
            const packet = document.createElement('div'); packet.className = 'packet';
            layer.appendChild(packet);
            const duration = 1500;
            const startTime = performance.now();
            function animate() {
                const now = performance.now();
                const progress = Math.min((now - startTime) / duration, 1);
                const curX = start.x + (end.x - start.x) * progress;
                const curY = start.y + (end.y - start.y) * progress;
                packet.style.left = `${curX}px`; packet.style.top = `${curY}px`;
                if(Math.random() > 0.4) {
                    const p = document.createElement('div'); p.className = 'particle'; p.style.left = `${curX}px`; p.style.top = `${curY}px`;
                    layer.appendChild(p); setTimeout(() => p.remove(), 600);
                }
                if(progress < 1) requestAnimationFrame(animate); else packet.remove();
            }
            requestAnimationFrame(animate);
        }

        async function runBinCheck() {
            const bin = document.getElementById('bin-input').value;
            const res = document.getElementById('bin-results');
            if(!bin) return; res.innerHTML = `> QUERYING DATABASE [${bin}]...`;
            try {
                const response = await fetch(`/api/bincheck?bin=${bin}`);
                const data = await response.json();
                if(data.BIN) {
                    const b = data.BIN;
                    res.innerHTML = `> 200 OK: DATA RETRIEVED\n\nBRAND: ${b.brand || 'N/A'}\nTYPE: ${b.type || 'N/A'}\nLEVEL: ${b.level || 'N/A'}\nBANK: ${b.bank || 'N/A'}\nCOUNTRY: ${b.country || 'N/A'}`;
                } else { res.innerHTML = `> ERROR: BIN NOT FOUND`; }
            } catch (e) { res.innerHTML = `> EXCEPTION: TIMEOUT`; }
        }

        function runFlooder() { document.getElementById('flood-results').innerText = '> DISPATCH OK'; addLog('EMAIL FLOOD INITIATED'); }
        async function runStormMatrix() {
            const input = document.getElementById('storm-input').value;
            const vault = document.getElementById('storm-vault');
            if(!input) return; vault.innerHTML = '> CONNECTING TO STORM...\n> AUTHENTICATING BATCH...';
            setTimeout(() => { vault.innerHTML = '> BATCH PROCESSED\n> NO HITS FOUND'; }, 2000);
        }
        function runSim(type) { document.getElementById(`${type}-results`).innerText = '> STATUS: 200 OK'; }
        function addLog(msg) { const stream = document.getElementById('log-stream'); stream.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + stream.innerHTML; }
